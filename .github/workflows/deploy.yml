name: Deploy QB Portal BE

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/hamzah1528cloud-web/qb-portal-be
  NAMESPACE: qbportal
  DEPLOYMENT: qb-portal-be
  HEALTH_URL: https://quickbooks.adeelirshad.com/health
  CLUSTER_IP: 46.250.247.116

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_DATA }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure GHCR pull secret
        run: |
          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-cred \
            --docker-server=ghcr.io \
            --docker-username='${{ github.repository_owner }}' \
            --docker-password='${{ secrets.GHCR_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync env ConfigMap
        run: |
          printf '%s' "${{ secrets.ENV_PROD }}" > .env.prod
          kubectl -n "$NAMESPACE" create configmap qb-env-config \
            --from-env-file=.env.prod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl -n "$NAMESPACE" set image deployment/"$DEPLOYMENT" \
            "$DEPLOYMENT"="$IMAGE:${{ github.sha }}"
          kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT" --timeout=180s

      - name: Verify health
        run: |
          for i in $(seq 1 10); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' \
              --resolve quickbooks.adeelirshad.com:443:"$CLUSTER_IP" "$HEALTH_URL" || true)
            echo "attempt $i -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "health check failed"; exit 1
