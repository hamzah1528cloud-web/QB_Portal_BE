apiVersion: apps/v1
kind: Deployment
metadata:
  name: qb-portal-be
  namespace: qbportal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qb-portal-be
  template:
    metadata:
      labels:
        app: qb-portal-be
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: qb-portal-be
          image: ghcr.io/hamzah1528cloud-web/qb-portal-be:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: qb-env-config
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
